# GitLab CI for @kadam-net/mcp-server.
#
# GitLab is the source of truth; GitHub (kadam-official/mcp-server) is a
# downstream push-mirror. npm publishing lives on GitHub Actions
# (.github/workflows/release.yml) because npm provenance/OIDC is only available
# from GitHub Actions / GitLab.com SaaS / CircleCI — self-hosted GitLab is not
# in npm's OIDC trust list. This pipeline owns all quality/security/build gates.
#
# Stages: setup -> quality -> arch_gates -> security -> test -> package -> publish
#
# The dist-build stage is named `package` (not `build`): the injected pipeline
# execution policy (devops/gitlab-policies) places its jobs in the default-order
# stages `build`/`deploy` (build BEFORE test), so a project-declared `build`
# stage after `test` makes the merged stage graph cyclic. Same layout as
# adverif/mcp.

default:
  image: node:22-alpine
  before_script:
    - command -v apk >/dev/null 2>&1 && apk add --no-cache git || true

stages:
  - setup
  - quality
  - arch_gates
  - security
  - test
  - package
  - publish

# Single pipeline per commit: suppress the detached merge_request_event pipeline
# (every job targets $CI_COMMIT_BRANCH, so the MR-event pipeline runs zero jobs
# and pollutes the MR head-pipeline badge).
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

# ─────────────────────────── setup ───────────────────────────
setup:
  stage: setup
  script:
    # --ignore-scripts: the "prepare" hook runs `npm run build`; we build
    # explicitly in the build stage instead.
    - npm ci --ignore-scripts
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm-cache/
    policy: pull-push
  artifacts:
    expire_in: 1 hour
    paths:
      - node_modules/

# ─────────────────────────── quality ─────────────────────────
lint:
  stage: quality
  needs: [setup]
  script: npm run lint

format-check:
  stage: quality
  needs: [setup]
  script: npm run format:check

typecheck:
  stage: quality
  needs: [setup]
  script: npm run typecheck

# ───────────────────────── arch_gates ────────────────────────
check:file-sizes:
  stage: arch_gates
  needs: [setup]
  script: npm run check:file-sizes

check:tool-naming:
  stage: arch_gates
  needs: [setup]
  script: npm run check:tool-naming

check:imports:
  stage: arch_gates
  needs: [setup]
  script: npm run check:imports

# Tenant-isolation gate (no module-level mutable state) — merge blocker.
check:shared-state:
  stage: arch_gates
  needs: [setup]
  script: npm run check:shared-state

# ───────────────────────── security ──────────────────────────
audit:deps:
  stage: security
  needs: [setup]
  script: npm run audit:deps

audit:licenses:
  stage: security
  needs: [setup]
  script: npm run audit:licenses

# ─────────────────────────── test ────────────────────────────
test:unit:
  stage: test
  needs: [setup, lint, typecheck]
  script: npm run test:unit -- --coverage

test:integration:
  stage: test
  needs: [setup, test:unit]
  script: npm run test:integration

# Multi-tenant isolation suite — NON-NEGOTIABLE merge gate.
test:isolation:
  stage: test
  needs: [setup, test:unit]
  script: npm run test:isolation

# Prod smoke — read-only liveness/auth probe against the deployed endpoint.
# Manual + allow_failure so it appears in the UI without burning CI minutes.
# Flip to a schedule once a sandbox bearer is provisioned. Requires CI vars
# (Masked + Protected): KADAM_MCP_PROD_TOKEN, KADAM_MCP_PROD_URL (optional).
prod:smoke:
  stage: test
  needs: [setup]
  rules:
    - when: manual
      allow_failure: true
  script: npm run prod:smoke

# ─────────────────────────── build ───────────────────────────
build:
  stage: package
  needs:
    - setup
    - lint
    - format-check
    - typecheck
    - check:file-sizes
    - check:tool-naming
    - check:imports
    - check:shared-state
    - audit:deps
    - audit:licenses
    - test:unit
    - test:integration
    - test:isolation
  script:
    - npm run build
    - npm run check:bundle-size
  artifacts:
    expire_in: 7 days
    paths:
      - dist/

# Exercises the SAME Dockerfile production runs (kaniko, no docker daemon).
docker:build:
  stage: package
  needs: [setup]
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script: []
  script:
    - /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" --no-push --destination "kadam-mcp:ci" --tar-path image.tar
    - mkdir -p image-extracted && tar -xf image.tar -C image-extracted
    - find image-extracted -type f -exec sh -c 'tar -tf "$1" 2>/dev/null || true' _ {} \; | sort -u > files.txt
    - 'echo "files.txt has $(wc -l < files.txt) entries"'
    - 'for f in app/package.json app/dist/index.js; do grep -q "^${f}$" files.txt || { echo "MISSING IN IMAGE: ${f}"; head -50 files.txt; exit 1; }; done'
    - echo "image contains expected runtime files"

# ────────────────────────── publish ──────────────────────────

# DISABLED — npm publish moved to GitHub Actions (.github/workflows/release.yml)
# for OIDC provenance. Self-hosted GitLab is not in npm's OIDC trust list, so a
# --provenance publish from here would ship unsigned or fail. Stub kept for
# traceability; releases tag in GitLab, mirror propagates the tag to GitHub, and
# GitHub release.yml publishes npm + .mcpb.
publish-npm:
  stage: publish
  rules:
    - when: never
  script:
    - echo "Publishing moved to GitHub Actions (.github/workflows/release.yml)."

# Server image for the K8s deployment (arranger pulls kadam-mcp from ECR).
# Manual; requires CI vars AWS_REGION, AWS_ECR_REGISTRY + runner AWS creds.
publish-ecr:
  stage: publish
  needs: [build]
  image: docker:latest
  services:
    - docker:dind
  variables:
    ECR_IMAGE: kadam-mcp
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$AWS_ECR_REGISTRY"
  script:
    - docker build -t "$AWS_ECR_REGISTRY/$ECR_IMAGE:main" -t "$AWS_ECR_REGISTRY/$ECR_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$AWS_ECR_REGISTRY/$ECR_IMAGE:main"
    - docker push "$AWS_ECR_REGISTRY/$ECR_IMAGE:$CI_COMMIT_SHORT_SHA"
  when: manual
