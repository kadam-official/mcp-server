services:
  kadam_mcp:
    build: .
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "8080"
      KADAM_ADV_API_BASE: http://kadam_frontend/api/v1
      KADAM_PUB_API_BASE: http://retarg_frontend/api
      KADAM_ADV_DOMAIN: https://partners.kadam-docker.sdev.pw
      KADAM_PUB_DOMAIN: https://pub.kadam-docker.sdev.pw
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
