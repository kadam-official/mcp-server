name: Release

# Tag-driven publish. Push `vMAJOR.MINOR.PATCH` (e.g. `v0.4.1`) whose value
# matches package.json `version`, and this workflow:
#   1. Verifies npm supports OIDC publish and the tag matches package.json.
#   2. Runs the full sanity gate (lint / format / typecheck / arch gates /
#      licenses / tests / build) — never publish a broken tag.
#   3. `npm publish --provenance` via GitHub OIDC (npm Trusted Publisher) —
#      mints a SLSA provenance attestation. Self-hosted GitLab is not in npm's
#      OIDC trust list, which is why publishing lives here, not .gitlab-ci.yml.
#   4. Builds + uploads the Claude Desktop .mcpb to the GitHub Release.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    # Single-approver gate: the `npm-publish` GitHub Environment has a required
    # reviewer, so every tagged release pauses for one-click human approval
    # before npm publish — guards against an accidental tag push. npm's Trusted
    # Publisher is configured without an environment constraint, so the extra
    # OIDC `environment` claim is harmless to the match (the debug step below
    # prints the claims if a mismatch ever surfaces).
    environment:
      name: npm-publish
      url: https://www.npmjs.com/package/@kadam-net/mcp-server
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so release-note generation can diff against the
          # previous tag.
          fetch-depth: 0
      # Node 24 ships npm >= 11.5.1, the first npm with OIDC Trusted Publisher
      # support. Node 22 LTS bundles npm 10.x → `npm publish --provenance` signs
      # the attestation but sends the PUT unauthenticated → HTTP 404.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify npm supports OIDC publish (>= 11.5.1)
        run: |
          NPM_VER=$(npm --version)
          echo "npm version: $NPM_VER"
          MAJOR=$(echo "$NPM_VER" | cut -d. -f1)
          if [ "$MAJOR" -lt 11 ]; then
            echo "ERROR: npm $NPM_VER is too old for OIDC publish (need >= 11.5.1)"
            exit 1
          fi

      - run: npm ci --ignore-scripts

      - name: Verify tag matches package.json version
        # Belt-and-suspenders against "tagged but forgot to bump package.json" —
        # would otherwise re-publish the previous version under a new tag.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: git tag '$GITHUB_REF_NAME' (-> $TAG_VERSION)"
            echo "       does NOT match package.json version ($PKG_VERSION)."
            echo "       Bump package.json and re-tag."
            exit 1
          fi
          echo "Tag/version match: $TAG_VERSION"

      # Full sanity gate — mirrors .github/workflows/ci.yml `checks` + `test`.
      # Never publish a tag that wouldn't pass CI.
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run check:file-sizes
      - run: npm run check:tool-naming
      - run: npm run check:imports
      - run: npm run check:shared-state
      - run: npm run audit:licenses
      - run: npm run test
      - run: npm run build
      - run: npm run check:bundle-size

      # Diagnostic: print the OIDC claims npm matches against. npm hides auth
      # failures as HTTP 404 for security obscurity, so if the publish below
      # 404s, compare these claims against the npm Trusted Publisher config.
      # Logs only the public JWT payload — the signed token is not printed.
      - name: Debug OIDC subject claim for npm
        # Diagnostic only — must never block a release if the OIDC introspection
        # endpoint or claim parsing hiccups.
        continue-on-error: true
        run: |
          set -e
          RESPONSE=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org")
          TOKEN=$(echo "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin)['value'])")
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+')
          PAD=$(( (4 - ${#PAYLOAD} % 4) % 4 ))
          if [ "$PAD" -gt 0 ]; then PAYLOAD="${PAYLOAD}$(printf '=%.0s' $(seq 1 $PAD))"; fi
          echo "::group::OIDC claims (audience: npm:registry.npmjs.org)"
          echo "$PAYLOAD" | base64 -d 2>/dev/null | python3 -c "
          import json, sys
          c = json.load(sys.stdin)
          for k in ('sub','repository','repository_owner','workflow','workflow_ref','job_workflow_ref','ref','event_name','environment'):
              print(f'  {k} = {c.get(k)!r}')
          "
          echo "::endgroup::"

      # --provenance: mint a sigstore/SLSA attestation via GitHub OIDC (npm
      # Trusted Publisher). Requires id-token:write + npm >= 11.5.1 (verified
      # above) + publishConfig.provenance:true in package.json.
      - run: npm publish --access public --provenance

  publish-mcpb:
    runs-on: ubuntu-latest
    # Only ship the .mcpb after npm publish succeeds — never leave a desktop
    # extension on a tag whose npm release failed.
    needs: [publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Verify tag matches package.json version
        # Repeated locally: this job depends only on publish-npm's success
        # conclusion (not its artefacts), so re-check before trusting package.json.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: git tag '$GITHUB_REF_NAME' (-> $TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi

      - run: npm run build
      - name: Prepare mcpb bundle
        run: |
          mkdir -p mcpb-bundle/server
          cp dist/index.js mcpb-bundle/server/index.js
          cp package.json mcpb-bundle/package.json
          cd mcpb-bundle
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            delete pkg.scripts;
            delete pkg.devDependencies;
            pkg.main = 'server/index.js';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --production --omit=dev
      - name: Write manifest.json
        run: |
          node -e "
            const pkg = require('./package.json');
            const manifest = {
              manifest_version: '0.3',
              name: 'kadam-mcp-server',
              display_name: 'Kadam Ad Network',
              version: pkg.version,
              description: pkg.description,
              author: { name: 'Kadam', url: 'https://kadam.net' },
              repository: { type: 'git', url: 'https://github.com/kadam-official/mcp-server.git' },
              homepage: 'https://kadam.net',
              license: 'MIT',
              privacy_policies: ['https://kadam.net/en/privacy'],
              keywords: ['advertising','ads','campaigns','analytics','kadam','marketing'],
              server: {
                type: 'node',
                entry_point: 'server/index.js',
                mcp_config: {
                  command: 'node',
                  args: ['\${__dirname}/server/index.js'],
                  env: {
                    KADAM_ADV_API_KEY: '\${user_config.adv_api_key}',
                    KADAM_PUB_API_KEY: '\${user_config.pub_api_key}'
                  }
                }
              },
              user_config: {
                terms_accepted: {
                  type: 'boolean',
                  title: 'I agree to Kadam Terms of Service',
                  description: 'https://www.kadam.net/en/terms-service',
                  required: true,
                  default: false
                },
                adv_api_key: {
                  type: 'string',
                  title: 'Advertiser API Key',
                  description: 'For campaign management. Get at partners.kadam.net → Profile → API',
                  sensitive: true,
                  required: false
                },
                pub_api_key: {
                  type: 'string',
                  title: 'Publisher API Key',
                  description: 'For site/ad-unit management. Get at pub.kadam.net → Profile → API',
                  sensitive: true,
                  required: false
                }
              },
              compatibility: {
                platforms: ['darwin','win32'],
                runtimes: { node: '>=18.0.0' }
              }
            };
            require('fs').writeFileSync('mcpb-bundle/manifest.json', JSON.stringify(manifest, null, 2));
          "
      - name: Write .mcpbignore
        run: echo -e "package-lock.json\nREADME.md\nLICENSE" > mcpb-bundle/.mcpbignore
      - name: Pack mcpb
        # Pin the mcpb CLI — an unpinned @latest could ship a breaking pack
        # change that fails the release. Bump deliberately after local verify.
        run: |
          cd mcpb-bundle
          npx -y @anthropic-ai/mcpb@2.1.2 pack .
          mv *.mcpb kadam-mcp-server.mcpb
      - name: Verify .mcpb size (< 15 MB)
        # Ceiling well under GitHub's 25 MB release-asset limit; current ~3.3 MB.
        # A jump means accidental dep bloat in the bundle.
        run: |
          SIZE=$(stat -c%s mcpb-bundle/kadam-mcp-server.mcpb)
          MB=$((SIZE / 1024 / 1024))
          echo "mcpb size: ${MB} MB (${SIZE} bytes)"
          if [ "$MB" -gt 15 ]; then echo "ERROR: .mcpb exceeds 15 MB"; exit 1; fi
      - name: Smoke test
        run: |
          mkdir -p /tmp/mcpb-test && cd /tmp/mcpb-test
          unzip -q $GITHUB_WORKSPACE/mcpb-bundle/kadam-mcp-server.mcpb
          echo '{"jsonrpc":"2.0","method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}},"id":0}' | node server/index.js 2>/dev/null | node -e "
            let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const r=JSON.parse(d);
              if(!r.result||!r.result.serverInfo){console.error('FAIL',d);process.exit(1)}
              console.log('OK:',r.result.serverInfo.version);
            });
          "
      - name: Create release if missing
        run: gh release create ${{ github.ref_name }} --generate-notes || true
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Upload mcpb to release
        run: gh release upload ${{ github.ref_name }} mcpb-bundle/kadam-mcp-server.mcpb --clobber
        env:
          GH_TOKEN: ${{ github.token }}
